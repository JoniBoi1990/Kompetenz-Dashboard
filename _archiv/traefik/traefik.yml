global:
  checkNewVersion: false
  sendAnonymousUsage: false

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

providers:
  docker:
    exposedByDefault: false
    network: public

certificatesResolvers:
  letsencrypt:
    acme:
      email: admin@schule.de
      storage: /acme.json
      httpChallenge:
        entryPoint: web

api:
  dashboard: false

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers for Teams iframe
    add_header X-Content-Type-Options "nosniff";
    add_header X-Frame-Options "ALLOW-FROM https://teams.microsoft.com";
    add_header Content-Security-Policy "frame-ancestors 'self' https://teams.microsoft.com;";
}
